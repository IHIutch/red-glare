name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Trusted Publishing, via the two-step pattern from
      # https://github.com/changesets/action/issues/422#issuecomment-2742776221.
      # The action manages the Version PR and git tagging (`changeset tag`
      # creates tags but doesn't publish). The actual `npm publish` runs
      # in the next step so npm's OIDC flow isn't pre-empted by the
      # placeholder auth token `actions/setup-node` injects when it sees
      # a registry-url. Explicit `NPM_TOKEN: ''` tells setup-node "don't
      # fill this in" — OIDC is the auth source.
      - name: Create Release PR or tag release
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset tag
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ''

      - name: Publish to npm
        if: steps.changesets.outputs.published == 'true'
        run: pnpm publish -r --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: "true"
