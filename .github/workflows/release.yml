name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Trusted Publishing: no NPM_TOKEN. `id-token: write` above lets
      # npm mint an OIDC token at publish time, which npm accepts because
      # this repo+workflow is registered as a Trusted Publisher on
      # npmjs.com. `NPM_TOKEN: ""` overrides the placeholder that
      # actions/setup-node would otherwise inject from the registry-url
      # config — npm prefers a real token over OIDC when one is present,
      # so we make sure there isn't one.
      #
      # Publish via `npx changeset publish` (npm CLI) rather than
      # `pnpm changeset publish`. npm's OIDC flow is native; pnpm's
      # publish shim may not route through it in all versions.
      - name: Create Release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          title: "chore: release packages"
          commit: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ""
          NPM_CONFIG_PROVENANCE: "true"
